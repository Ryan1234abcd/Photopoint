<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Code Generator — Photopoint</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { overflow: auto; height: auto; min-height: 100vh; }

    #qr-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 16px;
      background: #fff;
      border-bottom: 1px solid #ddd;
    }

    #qr-toolbar a {
      font-size: 0.85rem;
      color: #2563eb;
      text-decoration: none;
      font-weight: 500;
    }
    #qr-toolbar a:hover { text-decoration: underline; }

    #qr-main {
      display: flex;
      gap: 32px;
      padding: 28px 32px;
      align-items: flex-start;
      flex-wrap: wrap;
    }

    /* ── Form panel ── */
    #qr-form-panel {
      flex: 1;
      min-width: 300px;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .field-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .field-group label {
      font-size: 0.8rem;
      font-weight: 600;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .field-group input,
    .field-group textarea {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 0.95rem;
      padding: 8px 10px;
      border: 1px solid #bbb;
      border-radius: 4px;
      background: #fff;
      color: #111;
      width: 100%;
      resize: vertical;
    }

    .field-group input:focus,
    .field-group textarea:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 2px rgba(37,99,235,0.15);
    }

    .field-group input[readonly] {
      background: #f3f3f3;
      color: #777;
      cursor: default;
    }

    .field-group textarea { min-height: 180px; }

    #generateBtn {
      padding: 10px 20px;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      align-self: flex-start;
    }
    #generateBtn:hover { background: #1d4ed8; }
    #generateBtn:active { background: #1e40af; }

    /* ── Preview panel ── */
    #qr-preview-panel {
      flex: 1;
      min-width: 280px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    #qr-preview {
      width: 100%;
      max-width: 420px;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 300px;
      padding: 12px;
    }

    #qr-preview svg {
      width: 100%;
      height: auto;
      display: block;
    }

    #qr-placeholder {
      color: #aaa;
      font-size: 0.95rem;
      text-align: center;
      padding: 40px 20px;
    }

    #downloadBtn {
      display: none;
      padding: 8px 20px;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    #downloadBtn:hover { background: #1d4ed8; }
    #downloadBtn.visible { display: inline-block; }

    .char-count {
      font-size: 0.75rem;
      font-weight: 400;
      color: #999;
      margin-left: 6px;
      text-transform: none;
      letter-spacing: 0;
    }
    .char-count.at-limit { color: #dc2626; }
    .field-warn { font-size: 0.78rem; color: #dc2626; }
    .field-note { font-size: 0.78rem; color: #888; }
  </style>
</head>
<body>
  <div id="qr-toolbar">
    <a href="index.html">&larr; Shim Generator</a>
    <span id="appTitle">QR Code Generator</span>
    <span style="width:120px"></span>
  </div>

  <div id="qr-main">
    <div id="qr-form-panel">
      <div class="field-group">
        <label>To</label>
        <input type="text" value="photos@tupureel.org" readonly>
      </div>
      <div class="field-group">
        <label>Subject <span id="subjectCount" class="char-count">9/15</span></label>
        <input type="text" id="subjectInput" value="CHCH-A-01" maxlength="15">
        <span id="subjectWarn" class="field-warn" style="display:none">Maximum 15 characters reached</span>
      </div>
      <div class="field-group">
        <label>Body <span id="bodyCount" class="char-count"></span></label>
        <textarea id="bodyInput">Attach a photo and send.
Use the frame to locate your camera.
Take another photo whenever you pass.</textarea>
        <span class="field-note">Shorter body = smaller, easier-to-scan QR code</span>
      </div>
      <div class="field-group">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
          <input type="checkbox" id="overlayEnabled" checked style="width:auto;cursor:pointer;">
          Overlay text
        </label>
        <input type="text" id="overlayInput" value="tupureel.org">
      </div>
      <div class="field-group">
        <label>Output style</label>
        <div style="display:flex;gap:20px;">
          <label style="text-transform:none;letter-spacing:0;font-weight:500;color:#333;cursor:pointer;display:flex;align-items:center;gap:6px;">
            <input type="radio" name="outputStyle" id="styleQr" value="qr" checked style="width:auto;"> QR code only
          </label>
          <label style="text-transform:none;letter-spacing:0;font-weight:500;color:#333;cursor:pointer;display:flex;align-items:center;gap:6px;">
            <input type="radio" name="outputStyle" id="styleSign" value="sign" style="width:auto;"> Full sign
          </label>
        </div>
      </div>
      <button id="generateBtn">Generate QR Code</button>
    </div>

    <div id="qr-preview-panel">
      <div id="qr-preview">
        <p id="qr-placeholder">Fill in the fields and click<br><strong>Generate QR Code</strong></p>
      </div>
      <button id="downloadBtn">Download SVG</button>
    </div>
  </div>

  <script src="vendor/qrcode-generator.js"></script>
  <script>
    const generateBtn = document.getElementById('generateBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const qrPreview   = document.getElementById('qr-preview');

    function buildMailto() {
      const subject = document.getElementById('subjectInput').value.trim();
      const body    = document.getElementById('bodyInput').value;
      return 'mailto:photos@tupureel.org'
        + '?subject=' + encodeURIComponent(subject)
        + '&body='    + encodeURIComponent(body);
    }

    function buildQrSvg(qr, overlayText) {
      const moduleCount = qr.getModuleCount();
      const cell  = 10;
      const border = 4;
      const total = (moduleCount + border * 2) * cell;
      const pad   = border * cell;
      const cx = total / 2, cy = total / 2;

      const ns = 'http://www.w3.org/2000/svg';
      const svg = document.createElementNS(ns, 'svg');
      svg.setAttribute('xmlns', ns);
      svg.setAttribute('viewBox', `0 0 ${total} ${total}`);
      svg.setAttribute('width',  total);
      svg.setAttribute('height', total);
      svg.setAttribute('shape-rendering', 'crispEdges');

      const bg = document.createElementNS(ns, 'rect');
      bg.setAttribute('width', total); bg.setAttribute('height', total); bg.setAttribute('fill', 'white');
      svg.appendChild(bg);

      for (let row = 0; row < moduleCount; row++) {
        for (let col = 0; col < moduleCount; col++) {
          if (qr.isDark(row, col)) {
            const r = document.createElementNS(ns, 'rect');
            r.setAttribute('x', pad + col * cell); r.setAttribute('y', pad + row * cell);
            r.setAttribute('width', cell);         r.setAttribute('height', cell);
            r.setAttribute('fill', 'black');
            svg.appendChild(r);
          }
        }
      }
      addOverlay(svg, ns, cx, cy, overlayText);
      return svg;
    }

    function buildSignSvg(qr, overlayText) {
      const ns = 'http://www.w3.org/2000/svg';
      const S = 600, fOuter = 8, fWidth = 48;
      const inner = fOuter + fWidth, innerSz = S - inner * 2;
      const cx = S / 2, cy = S / 2;
      const green = '#3a6b1d', textClr = '#a0c070';

      const svg = document.createElementNS(ns, 'svg');
      svg.setAttribute('xmlns', ns);
      svg.setAttribute('viewBox', `0 0 ${S} ${S}`);
      svg.setAttribute('width', S); svg.setAttribute('height', S);

      function mk(tag, attrs, txt) {
        const e = document.createElementNS(ns, tag);
        for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
        if (txt !== undefined) e.textContent = txt;
        return e;
      }

      // Layers
      svg.appendChild(mk('rect', {width:S, height:S, rx:44, ry:44, fill:'white'}));
      svg.appendChild(mk('rect', {x:fOuter, y:fOuter, width:S-fOuter*2, height:S-fOuter*2, rx:38, ry:38, fill:green}));
      svg.appendChild(mk('rect', {x:inner, y:inner, width:innerSz, height:innerSz, rx:10, ry:10, fill:'white'}));

      // Mounting holes at top and bottom centre of inner area
      svg.appendChild(mk('circle', {cx, cy:inner,         r:14, fill:'#e0e0e0', stroke:'#aaa', 'stroke-width':1.5}));
      svg.appendChild(mk('circle', {cx, cy:inner+innerSz, r:14, fill:'#e0e0e0', stroke:'#aaa', 'stroke-width':1.5}));

      // Right-pointing arrow — base inside white area, tip into green frame
      const aBase = inner + innerSz - 48, aTip = inner + qrPad, aH = 240;
      svg.appendChild(mk('polygon', {
        points:`${aBase},${cy-aH/2} ${aTip},${cy} ${aBase},${cy+aH/2}`,
        fill:green
      }));

      // Border text — top, bottom (inverted), left (−90°), right (+90°)
      const tA = {'font-family':'Arial,Helvetica,sans-serif','font-size':22,'font-weight':'bold',
                  fill:textClr,'letter-spacing':4,'text-anchor':'middle','dominant-baseline':'central'};
      const tC = fOuter + fWidth / 2;
      svg.appendChild(mk('text', {...tA, x:cx, y:tC}, 'tupureel.org'));
      svg.appendChild(mk('text', {...tA, x:cx, y:S-tC, transform:`rotate(180,${cx},${S-tC})`}, 'tupureel.org'));
      svg.appendChild(mk('text', {...tA, x:tC, y:cy,   transform:`rotate(-90,${tC},${cy})`},   'tupureel.org'));
      svg.appendChild(mk('text', {...tA, x:S-tC, y:cy, transform:`rotate(90,${S-tC},${cy})`},  'tupureel.org'));

      // QR modules
      const qrPad = 60, qrArea = innerSz - qrPad * 2;
      const n = qr.getModuleCount(), cell = qrArea / n;
      const qrX = inner + qrPad, qrY = inner + qrPad;
      for (let row = 0; row < n; row++) {
        for (let col = 0; col < n; col++) {
          if (qr.isDark(row, col))
            svg.appendChild(mk('rect', {x:qrX+col*cell, y:qrY+row*cell, width:cell, height:cell, fill:'black'}));
        }
      }
      addOverlay(svg, ns, cx, cy, overlayText);
      return svg;
    }

    function addOverlay(svg, ns, cx, cy, overlayText) {
      if (!overlayText) return;
      const fs = 32, rpx = 16, rpy = 10;
      const rw = overlayText.length * fs * 0.62 + rpx * 2;
      const rh = fs * 1.4 + rpy * 2;
      function el(tag, attrs, txt) {
        const e = document.createElementNS(ns, tag);
        for (const [k,v] of Object.entries(attrs)) e.setAttribute(k,v);
        if (txt !== undefined) e.textContent = txt;
        return e;
      }
      svg.appendChild(el('rect', {x:cx-rw/2, y:cy-rh/2, width:rw, height:rh, fill:'white', rx:5, ry:5}));
      svg.appendChild(el('text', {x:cx, y:cy, 'text-anchor':'middle', 'dominant-baseline':'central',
        'font-family':'Arial,Helvetica,sans-serif', 'font-size':fs, 'font-weight':'bold',
        fill:'#1a1a1a', 'letter-spacing':0.5}, overlayText));
    }

    const subjectInput = document.getElementById('subjectInput');
    const subjectCount = document.getElementById('subjectCount');
    const subjectWarn  = document.getElementById('subjectWarn');
    const bodyInput    = document.getElementById('bodyInput');
    const bodyCount    = document.getElementById('bodyCount');

    function updateSubjectCount() {
      const len = subjectInput.value.length;
      subjectCount.textContent = len + '/15';
      subjectCount.classList.toggle('at-limit', len >= 15);
      subjectWarn.style.display = len >= 15 ? '' : 'none';
    }
    subjectInput.addEventListener('input', updateSubjectCount);
    updateSubjectCount();

    function updateBodyCount() {
      bodyCount.textContent = bodyInput.value.length + ' chars';
    }
    bodyInput.addEventListener('input', updateBodyCount);
    updateBodyCount();

    const overlayEnabled = document.getElementById('overlayEnabled');
    const overlayInput   = document.getElementById('overlayInput');
    overlayEnabled.addEventListener('change', () => {
      overlayInput.disabled = !overlayEnabled.checked;
    });

    generateBtn.addEventListener('click', () => {
      const mailto      = buildMailto();
      const overlayText = overlayEnabled.checked ? (overlayInput.value || 'tupureel.org') : null;
      const isSign      = document.getElementById('styleSign').checked;

      const qr = qrcode(0, 'H');
      qr.addData(mailto);
      qr.make();

      const svgEl = isSign ? buildSignSvg(qr, overlayText) : buildQrSvg(qr, overlayText);

      qrPreview.innerHTML = '';
      qrPreview.appendChild(svgEl);

      const svgString = new XMLSerializer().serializeToString(svgEl);
      downloadBtn.classList.add('visible');
      downloadBtn.onclick = () => {
        const blob = new Blob([svgString], { type: 'image/svg+xml' });
        const url  = URL.createObjectURL(blob);
        const a    = document.createElement('a');
        a.href     = url;
        a.download = isSign ? 'tupureel_sign.svg' : 'tupureel_qr.svg';
        a.click();
        URL.revokeObjectURL(url);
      };
    });
  </script>
</body>
</html>
